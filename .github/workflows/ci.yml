name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Install lcov
      run: sudo apt update && sudo apt install -y lcov

    - name: Configure
      run: cmake -H. -B_build -DBUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Debug

    - name: Build
      run: cmake --build _build

    - name: Run tests
      run: cd _build && ctest --verbose

    - name: Collect coverage
      run: |
        lcov --capture --directory . --output-file coverage.info
        lcov --remove coverage.info '/usr/*' '*/third-party/*' '*/tests/*' --output-file coverage.info
        lcov --list coverage.info

    - name: Upload to Coveralls
      uses: coverallsapp/github-action@v2
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        file: coverage.info
        format: lcov
